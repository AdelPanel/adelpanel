# ══════════════════════════════════════════════
#  AdelPanel — nginx/adelpanel.conf
#  Путь: /etc/nginx/conf.d/adelpanel.conf
#  Сертификаты: /etc/nginx/ssl/adelpanel.{crt,key}
# ══════════════════════════════════════════════

server {
    listen 7474 ssl;
    server_name _;
    server_tokens off;

    # Самоподписный сертификат (создаётся install.sh)
    ssl_certificate     /etc/nginx/ssl/adelpanel.crt;
    ssl_certificate_key /etc/nginx/ssl/adelpanel.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    root /opt/adelpanel/public;
    index index.php;

    # Логи панели
    access_log /var/log/nginx/adelpanel.access.log;
    error_log  /var/log/nginx/adelpanel.error.log warn;

    # X-Frame-Options not set — allows same-origin iframes for PMA/FileGator
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000" always;

    client_max_body_size 512M;

    # Запрет прямого доступа к panel.html — всегда через index.php (для CSRF)
    location = /panel.html { return 302 /; }

    # SPA роутинг — всё через index.php
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP через отдельный пул (пользователь adelpanel)
    location ~ \.php$ {
        fastcgi_pass   unix:/run/php/adelpanel.sock;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include        fastcgi_params;
        fastcgi_read_timeout 180;
    }

    # Статика
    location ~* \.(css|js|png|jpg|svg|ico|woff2?)$ {
        expires 1d;
        add_header Cache-Control "public";
    }

    # PHPMyAdmin — доступен по /extras/phpmyadmin/
    location ^~ /extras/phpmyadmin/ {
        alias /opt/adelpanel/extras/phpmyadmin/;
        index index.php;
        location ~ \.php$ {
            fastcgi_pass   unix:/run/php/adelpanel.sock;
            fastcgi_index  index.php;
            fastcgi_param  SCRIPT_FILENAME $request_filename;
            include        fastcgi_params;
            fastcgi_read_timeout 60;
        }
    }

    # FileGator — доступен по /extras/filegator/
    location ^~ /extras/filegator/ {
        alias /opt/adelpanel/extras/filegator/;
        index index.php;
        location ~ \.php$ {
            fastcgi_pass   unix:/run/php/adelpanel.sock;
            fastcgi_index  index.php;
            fastcgi_param  SCRIPT_FILENAME $request_filename;
            include        fastcgi_params;
            fastcgi_read_timeout 60;
        }
    }

    # Блокируем прямой доступ к raw-файлам (НЕ блокируем api/, config/ и т.д. — они работают через PHP)
    location ~* \.(sh|log|db|htpasswd)$ { deny all; }
    location ~ /\. { deny all; }
}
